<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VOX RANDOM DRAW</title>
<style>
:root{
  --bg:#05070b;
  --panel:#0a0f16cc;
  --cyan:#00f6ff;
  --cyan2:#7dfcff;
  --pink:#ff2bd6;
  --red:#ff3b5f;
  --text:#d9ffff;
  --dim:#7aa7ad;
  --line:rgba(0,246,255,.22);
  --gold:#ffd86b;
  --green:#7dffb3;
  --violet:#b388ff;
  --rose:#ff8ac8;
  --orange:#ff9f57;
  --blue:#7ab8ff;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,246,255,.08), transparent 30%),
    radial-gradient(circle at 20% 20%, rgba(255,43,214,.08), transparent 25%),
    radial-gradient(circle at 80% 80%, rgba(0,246,255,.06), transparent 25%),
    linear-gradient(180deg, #04070a 0%, #020406 100%);
  color:var(--text);
  font-family:"Consolas","Pretendard","Malgun Gothic",monospace;
  display:flex;
  align-items:center;
  justify-content:center;
}

.bg-grid,
.bg-grid::before,
.bg-grid::after{
  position:fixed;
  inset:0;
  pointer-events:none;
}
.bg-grid{
  background:
    linear-gradient(rgba(0,246,255,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,246,255,.06) 1px, transparent 1px);
  background-size:36px 36px;
  mask-image:radial-gradient(circle at center, black 30%, transparent 85%);
}
.bg-grid::before{
  content:"";
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.04) 0px,
      rgba(255,255,255,.04) 2px,
      transparent 2px,
      transparent 4px
    );
  mix-blend-mode:screen;
  opacity:.18;
}
.bg-grid::after{
  content:"";
  background:linear-gradient(
    to bottom,
    transparent 0%,
    rgba(255,255,255,.05) 45%,
    transparent 100%
  );
  animation:scan 7s linear infinite;
  opacity:.3;
}
@keyframes scan{
  from{transform:translateY(-100%)}
  to{transform:translateY(100%)}
}

.particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}
.particle{
  position:absolute;
  width:2px;
  height:70px;
  background:linear-gradient(to bottom, transparent, rgba(0,246,255,.8), transparent);
  opacity:.3;
  animation:fall linear infinite;
}
@keyframes fall{
  from{transform:translateY(-120px)}
  to{transform:translateY(calc(100vh + 120px))}
}

.wrap{
  width:min(94vw, 1040px);
  position:relative;
}

.panel{
  position:relative;
  padding:24px;
  border:1px solid var(--line);
  background:var(--panel);
  backdrop-filter:blur(10px);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.03) inset,
    0 0 22px rgba(0,246,255,.18),
    0 0 60px rgba(0,246,255,.10),
    0 0 120px rgba(255,43,214,.06);
  border-radius:22px;
  overflow:hidden;
}

.panel::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:22px;
  padding:1px;
  background:linear-gradient(135deg, rgba(0,246,255,.7), rgba(255,43,214,.6), rgba(0,246,255,.4));
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  opacity:.7;
  pointer-events:none;
}

.header{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  margin-bottom:18px;
}

.title{
  font-size:clamp(24px,4vw,40px);
  font-weight:900;
  letter-spacing:3px;
  color:var(--cyan2);
  text-shadow:
    0 0 10px rgba(0,246,255,.7),
    0 0 20px rgba(0,246,255,.35);
}

.sub{
  color:var(--dim);
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:4px;
}

.warning{
  display:inline-block;
  padding:.35em .7em;
  border:1px solid rgba(255,59,95,.4);
  border-radius:999px;
  color:#ff8ca2;
  background:rgba(255,59,95,.08);
  font-size:12px;
  letter-spacing:1px;
}

.statusbar{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:10px;
  margin-bottom:16px;
}
.badge{
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 12px;
  color:#b7fbff;
  background:rgba(0,0,0,.22);
  box-shadow:0 0 14px rgba(0,246,255,.08) inset;
  font-size:13px;
}
.badge strong{color:var(--cyan2)}
.badge .value{
  display:block;
  margin-top:6px;
  font-size:18px;
  font-weight:900;
  color:#fff;
}

.layout{
  display:grid;
  grid-template-columns:1.35fr .95fr;
  gap:16px;
}

.screen{
  position:relative;
  min-height:290px;
  border-radius:18px;
  border:1px solid rgba(0,246,255,.25);
  background:
    radial-gradient(circle at top, rgba(0,246,255,.12), transparent 45%),
    linear-gradient(180deg, rgba(7,16,24,.95), rgba(4,8,12,.95));
  box-shadow:
    inset 0 0 30px rgba(0,246,255,.08),
    inset 0 -30px 60px rgba(255,43,214,.05),
    0 0 25px rgba(0,246,255,.08);
  overflow:hidden;
  padding:22px;
}

.screen::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.03) 0 2px,
      transparent 2px 4px
    );
  opacity:.18;
  pointer-events:none;
}

.flash{
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,255,255,.6), transparent 35%);
  opacity:0;
  pointer-events:none;
}
.flash.active{
  animation:flash .6s ease;
}
@keyframes flash{
  0%{opacity:0}
  20%{opacity:.9}
  100%{opacity:0}
}

.glitch-layer{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:0;
}
.glitch-layer.active{
  opacity:1;
  animation:glitch .45s steps(2,end);
}
@keyframes glitch{
  0%{transform:translate(0)}
  20%{transform:translate(4px,-2px)}
  40%{transform:translate(-3px,2px)}
  60%{transform:translate(3px,1px)}
  80%{transform:translate(-2px,-1px)}
  100%{transform:translate(0)}
}

.result-box{
  position:relative;
  z-index:1;
  min-height:205px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:10px;
}

.label{
  color:#7dd6dc;
  letter-spacing:3px;
  font-size:12px;
}

.result{
  font-size:clamp(30px,5vw,58px);
  font-weight:900;
  letter-spacing:2px;
  text-shadow:0 0 14px rgba(0,246,255,.35);
  transform-origin:center;
  word-break:keep-all;
  transition:filter .25s ease, text-shadow .25s ease, color .25s ease;
}

.desc{
  min-height:24px;
  color:#98b3b7;
  font-size:14px;
}

.result.rolling{
  animation:flicker .08s infinite;
}
@keyframes flicker{
  0%{opacity:1; transform:translateX(0)}
  25%{opacity:.85; transform:translateX(.5px)}
  50%{opacity:.95; transform:translateX(-.5px)}
  75%{opacity:.8; transform:translateX(.5px)}
  100%{opacity:1; transform:translateX(0)}
}

.result.win{
  color:var(--gold);
  text-shadow:
    0 0 10px rgba(255,216,107,.9),
    0 0 24px rgba(255,216,107,.55),
    0 0 45px rgba(255,43,214,.25);
  animation:winPop .8s ease;
}
@keyframes winPop{
  0%{transform:scale(.72); filter:blur(6px); opacity:.2}
  45%{transform:scale(1.12); filter:blur(0); opacity:1}
  100%{transform:scale(1)}
}

.result.lose{
  color:#9cb1b4;
  text-shadow:
    0 0 8px rgba(255,255,255,.12),
    0 0 20px rgba(255,59,95,.12);
  animation:loseShake .45s ease;
}
@keyframes loseShake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

.result.final{
  color:var(--green);
  text-shadow:
    0 0 12px rgba(125,255,179,.8),
    0 0 24px rgba(125,255,179,.45);
  animation:winPop .8s ease;
}

/* prize-specific */
.theme-violent{
  color:#ff8b8b !important;
  text-shadow:
    0 0 10px rgba(255,80,80,.9),
    0 0 24px rgba(255,80,80,.5),
    0 0 42px rgba(255,59,95,.28) !important;
}
.theme-cute{
  color:#ff9fd8 !important;
  text-shadow:
    0 0 10px rgba(255,143,200,.95),
    0 0 24px rgba(255,143,200,.52),
    0 0 42px rgba(255,43,214,.28) !important;
}
.theme-mint{
  color:#91ffd8 !important;
  text-shadow:
    0 0 10px rgba(145,255,216,.95),
    0 0 24px rgba(145,255,216,.48),
    0 0 42px rgba(0,246,255,.24) !important;
}
.theme-violet{
  color:#c7a2ff !important;
  text-shadow:
    0 0 10px rgba(179,136,255,.95),
    0 0 24px rgba(179,136,255,.52),
    0 0 42px rgba(139,92,246,.28) !important;
}
.theme-gold{
  color:#ffd86b !important;
  text-shadow:
    0 0 10px rgba(255,216,107,.95),
    0 0 24px rgba(255,216,107,.52),
    0 0 42px rgba(255,180,0,.28) !important;
}
.theme-orange{
  color:#ffb072 !important;
  text-shadow:
    0 0 10px rgba(255,160,87,.95),
    0 0 24px rgba(255,160,87,.52),
    0 0 42px rgba(255,120,0,.28) !important;
}
.theme-blue{
  color:#91c3ff !important;
  text-shadow:
    0 0 10px rgba(122,184,255,.95),
    0 0 24px rgba(122,184,255,.5),
    0 0 42px rgba(59,130,246,.28) !important;
}

.screen.effect-gold{
  box-shadow:
    inset 0 0 30px rgba(255,216,107,.12),
    inset 0 -30px 60px rgba(255,200,90,.08),
    0 0 35px rgba(255,216,107,.18);
}
.screen.effect-violet{
  box-shadow:
    inset 0 0 30px rgba(179,136,255,.12),
    inset 0 -30px 60px rgba(139,92,246,.08),
    0 0 35px rgba(179,136,255,.18);
}
.screen.effect-cute{
  box-shadow:
    inset 0 0 30px rgba(255,143,200,.12),
    inset 0 -30px 60px rgba(255,43,214,.08),
    0 0 35px rgba(255,143,200,.18);
}
.screen.effect-violent{
  box-shadow:
    inset 0 0 30px rgba(255,80,80,.12),
    inset 0 -30px 60px rgba(255,59,95,.08),
    0 0 35px rgba(255,80,80,.18);
}
.screen.effect-mint{
  box-shadow:
    inset 0 0 30px rgba(145,255,216,.12),
    inset 0 -30px 60px rgba(0,246,255,.08),
    0 0 35px rgba(145,255,216,.18);
}
.screen.effect-orange{
  box-shadow:
    inset 0 0 30px rgba(255,160,87,.12),
    inset 0 -30px 60px rgba(255,120,0,.08),
    0 0 35px rgba(255,160,87,.18);
}
.screen.effect-blue{
  box-shadow:
    inset 0 0 30px rgba(122,184,255,.12),
    inset 0 -30px 60px rgba(59,130,246,.08),
    0 0 35px rgba(122,184,255,.18);
}

.effect-burst::after{
  content:"";
  position:absolute;
  inset:-20%;
  background:radial-gradient(circle, rgba(255,255,255,.13), transparent 35%);
  animation:burst .9s ease;
  pointer-events:none;
}
@keyframes burst{
  0%{transform:scale(.4); opacity:0}
  25%{transform:scale(1); opacity:1}
  100%{transform:scale(1.4); opacity:0}
}

.controls{
  margin-top:18px;
  display:grid;
  grid-template-columns:1fr 180px 160px;
  gap:12px;
}

button{
  appearance:none;
  border:none;
  cursor:pointer;
  border-radius:16px;
  padding:18px 18px;
  font-size:16px;
  font-weight:900;
  letter-spacing:2px;
  color:#03151a;
  background:linear-gradient(180deg, var(--cyan2), var(--cyan));
  box-shadow:
    0 8px 20px rgba(0,246,255,.2),
    0 0 18px rgba(0,246,255,.4),
    inset 0 1px 0 rgba(255,255,255,.55);
  transition:transform .12s ease, box-shadow .12s ease, filter .12s ease, opacity .12s ease;
}
button:hover{
  transform:translateY(-2px) scale(1.01);
  box-shadow:
    0 10px 24px rgba(0,246,255,.25),
    0 0 24px rgba(0,246,255,.55),
    inset 0 1px 0 rgba(255,255,255,.7);
}
button:active{
  transform:translateY(1px) scale(.995);
  filter:brightness(.95);
}
button:disabled{
  cursor:not-allowed;
  opacity:.55;
}

.smallbtn{
  background:linear-gradient(180deg, #1a2633, #101923);
  color:#c9feff;
  border:1px solid rgba(0,246,255,.25);
  box-shadow:
    0 0 14px rgba(0,246,255,.12),
    inset 0 1px 0 rgba(255,255,255,.08);
}

.dangerbtn{
  background:linear-gradient(180deg, #3a1620, #241017);
  color:#ffd3db;
  border:1px solid rgba(255,59,95,.28);
  box-shadow:
    0 0 14px rgba(255,59,95,.12),
    inset 0 1px 0 rgba(255,255,255,.06);
}

.side{
  display:grid;
  gap:16px;
}

.card{
  border:1px solid rgba(0,246,255,.18);
  border-radius:16px;
  padding:14px;
  background:rgba(2,6,10,.55);
  min-height:120px;
}

.card-title{
  color:#8eeef3;
  font-size:12px;
  letter-spacing:2px;
  margin-bottom:10px;
}

.log-list,
.win-list{
  display:grid;
  gap:8px;
  max-height:220px;
  overflow:auto;
}

.log-item,
.win-item{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:10px 12px;
  border-radius:10px;
  background:rgba(255,255,255,.02);
  color:#adc9cc;
  font-size:13px;
  border:1px solid rgba(255,255,255,.03);
}

.log-item b{color:#fff}
.log-item.win b{color:var(--gold)}
.log-item.lose b{color:#c5d1d3}
.log-item.final b{color:var(--green)}

.win-item{
  justify-content:flex-start;
  color:#ffe8a2;
  border-color:rgba(255,216,107,.18);
  background:rgba(255,216,107,.04);
}
.win-item .index{
  color:#fff;
  min-width:22px;
}

.empty{
  color:#6f8d92;
  font-size:13px;
}

.footer-note{
  margin-top:12px;
  color:#6f8d92;
  font-size:12px;
  text-align:right;
  letter-spacing:1px;
}

@media (max-width:920px){
  .layout{
    grid-template-columns:1fr;
  }
}
@media (max-width:720px){
  .controls{
    grid-template-columns:1fr;
  }
  .statusbar{
    grid-template-columns:1fr 1fr;
  }
}
@media (max-width:520px){
  .statusbar{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="particles" id="particles"></div>

<div class="wrap">
  <div class="panel">
    <div class="header">
      <div>
        <div class="sub">VoxTek Entertainment System</div>
        <div class="title">RANDOM DRAW</div>
      </div>
      <div class="warning">※ 4:00 am 취침 + 12:00~2:00 pm 기상 준수 ※</div>
    </div>

    <div class="statusbar">
      <div class="badge">
        <strong>STATUS</strong>
        <span class="value" id="statusText">STANDBY</span>
      </div>
      <div class="badge">
        <strong>REMAINING</strong>
        <span class="value" id="remainingCount">100 / 100</span>
      </div>
      <div class="badge">
        <strong>FAIL LEFT</strong>
        <span class="value" id="failCount">90</span>
      </div>
      <div class="badge">
        <strong>WIN LEFT</strong>
        <span class="value" id="winCount">10</span>
      </div>
    </div>

    <div class="layout">
      <div>
        <div class="screen" id="screen">
          <div class="flash" id="flash"></div>
          <div class="glitch-layer" id="glitchLayer"></div>

          <div class="result-box">
            <div class="label">SYSTEM OUTPUT</div>
            <div class="result" id="result">PRESS EXECUTE</div>
            <div class="desc" id="desc">버튼을 눌러 추첨을 시작하세요.</div>
          </div>
        </div>

        <div class="controls">
          <button id="drawBtn">EXECUTE DRAW</button>
          <button class="smallbtn" id="muteBtn">SOUND : ON</button>
          <button class="dangerbtn" id="resetBtn">RESET DATA</button>
        </div>
      </div>

      <div class="side">
        <div class="card">
          <div class="card-title">WIN ACQUIRED</div>
          <div class="win-list" id="winList">
            <div class="empty">아직 획득한 당첨이 없습니다.</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">RECENT LOG</div>
          <div class="log-list" id="logList"></div>
        </div>
      </div>
    </div>

    <div class="footer-note">발렌티노의 즐거운 뽑기 시간 ~ 운빨 좆망겜 ~</div>
  </div>
</div>

<script>
const STORAGE_KEY = "voxtek_random_draw_state_v2";

const prizeList = [
  "박기",
  "줘 패기",
  "애교 받기",
  "안 재우기",
  "고양이 복스",
  "1일 존댓말",
  "뒤... 오랄",
  "주제 글쓰기",
  "영구 닉변권",
  "소원권"
];

const failTexts = [
  "꽝",
  "FAILED",
  "ACCESS DENIED",
  "NULL",
  "NO SIGNAL",
  "MISS",
  "REJECTED",
  "ERROR"
];

const prizeEffects = {
  "박기": {
    themeClass: "theme-violent",
    screenClass: "effect-violent effect-burst",
    desc: "강한 충돌 신호 감지. 공격성 높은 보상이 승인되었습니다.",
    sound: "violent"
  },
  "줘 패기": {
    themeClass: "theme-violent",
    screenClass: "effect-violent effect-burst",
    desc: "직접 제압 권한이 활성화되었습니다.",
    sound: "violent"
  },
  "애교 받기": {
    themeClass: "theme-cute",
    screenClass: "effect-cute effect-burst",
    desc: "호감도 기반 특수 보상이 출력되었습니다.",
    sound: "cute"
  },
  "안 재우기": {
    themeClass: "theme-orange",
    screenClass: "effect-orange effect-burst",
    desc: "야간 통제 프로토콜이 활성화되었습니다.",
    sound: "orange"
  },
  "고양이 복스": {
    themeClass: "theme-cute",
    screenClass: "effect-cute effect-burst",
    desc: "고양이형 복스 변환 모드가 선택되었습니다.",
    sound: "cute"
  },
  "1일 존댓말": {
    themeClass: "theme-mint",
    screenClass: "effect-mint effect-burst",
    desc: "예의 모듈이 1일간 강제 적용됩니다.",
    sound: "mint"
  },
  "뒤... 오랄": {
    themeClass: "theme-blue",
    screenClass: "effect-blue effect-burst",
    desc: "민감 보상 프로토콜이 잠금 해제되었습니다.",
    sound: "blue"
  },
  "주제 글쓰기": {
    themeClass: "theme-orange",
    screenClass: "effect-orange effect-burst",
    desc: "창작 미션이 지정되었습니다.",
    sound: "orange"
  },
  "영구 닉변권": {
    themeClass: "theme-violet",
    screenClass: "effect-violet effect-burst",
    desc: "식별자 영구 변경 권한이 승인되었습니다.",
    sound: "violet"
  },
  "소원권": {
    themeClass: "theme-gold",
    screenClass: "effect-gold effect-burst",
    desc: "최상위 소원 실행 권한이 승인되었습니다.",
    sound: "gold"
  }
};

const resultEl = document.getElementById("result");
const descEl = document.getElementById("desc");
const drawBtn = document.getElementById("drawBtn");
const muteBtn = document.getElementById("muteBtn");
const resetBtn = document.getElementById("resetBtn");
const flashEl = document.getElementById("flash");
const glitchLayer = document.getElementById("glitchLayer");
const logList = document.getElementById("logList");
const winList = document.getElementById("winList");
const remainingCountEl = document.getElementById("remainingCount");
const failCountEl = document.getElementById("failCount");
const winCountEl = document.getElementById("winCount");
const statusTextEl = document.getElementById("statusText");
const screenEl = document.getElementById("screen");

let pool = [];
let acquiredWins = [];
let recentLogs = [];
let isRolling = false;
let soundOn = true;
let audioCtx = null;

function getDefaultState(){
  const initialPool = [];

  for(let i = 0; i < 90; i++){
    initialPool.push({ type:"fail", label:"꽝" });
  }

  for(const prize of prizeList){
    initialPool.push({ type:"win", label:prize });
  }

  return {
    pool: initialPool,
    acquiredWins: [],
    recentLogs: []
  };
}

function saveState(){
  const state = {
    pool,
    acquiredWins,
    recentLogs
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);

    if(!raw){
      const defaults = getDefaultState();
      pool = defaults.pool;
      acquiredWins = defaults.acquiredWins;
      recentLogs = defaults.recentLogs;
      saveState();
      return;
    }

    const parsed = JSON.parse(raw);

    if(
      !parsed ||
      !Array.isArray(parsed.pool) ||
      !Array.isArray(parsed.acquiredWins) ||
      !Array.isArray(parsed.recentLogs)
    ){
      throw new Error("Invalid stored state");
    }

    pool = parsed.pool;
    acquiredWins = parsed.acquiredWins;
    recentLogs = parsed.recentLogs;
  }catch(error){
    const defaults = getDefaultState();
    pool = defaults.pool;
    acquiredWins = defaults.acquiredWins;
    recentLogs = defaults.recentLogs;
    saveState();
  }
}

function resetState(){
  const defaults = getDefaultState();
  pool = defaults.pool;
  acquiredWins = defaults.acquiredWins;
  recentLogs = defaults.recentLogs;
  saveState();

  clearResultTheme();
  resultEl.className = "result";
  resultEl.textContent = "PRESS EXECUTE";
  descEl.textContent = "버튼을 눌러 추첨을 시작하세요.";
  drawBtn.disabled = false;
  drawBtn.textContent = "EXECUTE DRAW";
  statusTextEl.textContent = "STANDBY";

  renderWinList();
  renderLogs();
  updateCounters();
}

function updateCounters(){
  const total = pool.length;
  const failLeft = pool.filter(item => item.type === "fail").length;
  const winLeft = pool.filter(item => item.type === "win").length;

  remainingCountEl.textContent = `${total} / 100`;
  failCountEl.textContent = failLeft;
  winCountEl.textContent = winLeft;

  if(total === 0){
    statusTextEl.textContent = "COMPLETE";
  }else if(isRolling){
    statusTextEl.textContent = "PROCESSING";
  }else{
    statusTextEl.textContent = "STANDBY";
  }
}

function renderWinList(){
  winList.innerHTML = "";

  if(acquiredWins.length === 0){
    const div = document.createElement("div");
    div.className = "empty";
    div.textContent = "아직 획득한 당첨이 없습니다.";
    winList.appendChild(div);
    return;
  }

  acquiredWins.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "win-item";
    div.innerHTML = `<span class="index">${index + 1}.</span><span>${escapeHtml(item)}</span>`;
    winList.appendChild(div);
  });
}

function renderLogs(){
  logList.innerHTML = "";

  if(recentLogs.length === 0){
    const div = document.createElement("div");
    div.className = "empty";
    div.textContent = "아직 기록이 없습니다.";
    logList.appendChild(div);
    return;
  }

  recentLogs.forEach(log => {
    const div = document.createElement("div");
    div.className = `log-item ${log.type}`;
    div.innerHTML = `<span>${escapeHtml(log.time)}</span><b>${escapeHtml(log.label)}</b><span>${escapeHtml(log.text)}</span>`;
    logList.appendChild(div);
  });
}

function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function beep({
  freq = 440,
  duration = 0.08,
  type = "square",
  volume = 0.03,
  slideTo = null
} = {}){
  if(!soundOn) return;
  initAudio();

  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);

  if(slideTo){
    osc.frequency.exponentialRampToValueAtTime(slideTo, now + duration);
  }

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(now);
  osc.stop(now + duration + 0.02);
}

function playClickSound(){
  beep({freq:560, duration:0.03, type:"square", volume:0.04, slideTo:420});
  setTimeout(() => beep({freq:740, duration:0.05, type:"square", volume:0.03, slideTo:620}), 25);
}

function playRollSound(step = 0){
  const base = 240 + (step % 8) * 35;
  beep({freq:base, duration:0.035, type:"sawtooth", volume:0.018, slideTo:base + 25});
}

function playLoseSound(){
  beep({freq:260, duration:0.08, type:"square", volume:0.04, slideTo:200});
  setTimeout(() => beep({freq:170, duration:0.14, type:"triangle", volume:0.03, slideTo:120}), 70);
}

function playWinSound(){
  beep({freq:420, duration:0.07, type:"triangle", volume:0.045, slideTo:580});
  setTimeout(() => beep({freq:620, duration:0.08, type:"triangle", volume:0.045, slideTo:860}), 80);
  setTimeout(() => beep({freq:860, duration:0.12, type:"triangle", volume:0.04, slideTo:1220}), 160);
}

function playFinalSound(){
  beep({freq:440, duration:0.08, type:"triangle", volume:0.04, slideTo:660});
  setTimeout(() => beep({freq:660, duration:0.09, type:"triangle", volume:0.04, slideTo:990}), 90);
  setTimeout(() => beep({freq:990, duration:0.12, type:"triangle", volume:0.04, slideTo:1320}), 180);
  setTimeout(() => beep({freq:1320, duration:0.18, type:"triangle", volume:0.05, slideTo:1600}), 300);
}

function playPrizeSound(kind){
  if(kind === "gold"){
    beep({freq:520, duration:0.05, type:"triangle", volume:0.05, slideTo:740});
    setTimeout(() => beep({freq:760, duration:0.08, type:"triangle", volume:0.05, slideTo:1180}), 80);
    setTimeout(() => beep({freq:1180, duration:0.14, type:"triangle", volume:0.05, slideTo:1560}), 180);
    return;
  }

  if(kind === "violet"){
    beep({freq:320, duration:0.06, type:"sawtooth", volume:0.045, slideTo:520});
    setTimeout(() => beep({freq:520, duration:0.09, type:"triangle", volume:0.04, slideTo:900}), 70);
    return;
  }

  if(kind === "cute"){
    beep({freq:700, duration:0.04, type:"square", volume:0.04, slideTo:860});
    setTimeout(() => beep({freq:880, duration:0.05, type:"square", volume:0.035, slideTo:1100}), 55);
    setTimeout(() => beep({freq:1020, duration:0.05, type:"triangle", volume:0.03, slideTo:1260}), 115);
    return;
  }

  if(kind === "violent"){
    beep({freq:210, duration:0.05, type:"square", volume:0.05, slideTo:160});
    setTimeout(() => beep({freq:180, duration:0.08, type:"sawtooth", volume:0.045, slideTo:120}), 60);
    return;
  }

  if(kind === "mint"){
    beep({freq:480, duration:0.05, type:"triangle", volume:0.04, slideTo:650});
    setTimeout(() => beep({freq:650, duration:0.07, type:"triangle", volume:0.035, slideTo:820}), 75);
    return;
  }

  if(kind === "orange"){
    beep({freq:390, duration:0.05, type:"square", volume:0.04, slideTo:520});
    setTimeout(() => beep({freq:560, duration:0.08, type:"sawtooth", volume:0.03, slideTo:710}), 60);
    return;
  }

  if(kind === "blue"){
    beep({freq:430, duration:0.05, type:"triangle", volume:0.04, slideTo:580});
    setTimeout(() => beep({freq:600, duration:0.07, type:"triangle", volume:0.035, slideTo:760}), 80);
    return;
  }

  playWinSound();
}

function randomFrom(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function pad(n){
  return String(n).padStart(2, "0");
}

function getTime(){
  const d = new Date();
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function addLog(type, text){
  const labelMap = {
    win: "WIN",
    lose: "FAIL",
    final: "END"
  };

  recentLogs.unshift({
    time: getTime(),
    label: labelMap[type] || "LOG",
    text
  });

  recentLogs = recentLogs.slice(0, 8);
  saveState();
  renderLogs();
}

function flash(){
  flashEl.classList.remove("active");
  void flashEl.offsetWidth;
  flashEl.classList.add("active");
}

function glitch(){
  glitchLayer.classList.remove("active");
  void glitchLayer.offsetWidth;
  glitchLayer.classList.add("active");
}

function clearResultTheme(){
  resultEl.classList.remove(
    "theme-violent",
    "theme-cute",
    "theme-mint",
    "theme-violet",
    "theme-gold",
    "theme-orange",
    "theme-blue"
  );

  screenEl.classList.remove(
    "effect-violent",
    "effect-cute",
    "effect-mint",
    "effect-violet",
    "effect-gold",
    "effect-orange",
    "effect-blue",
    "effect-burst"
  );
}

function applyPrizeTheme(prize){
  clearResultTheme();

  const effect = prizeEffects[prize];
  if(!effect) return;

  if(effect.themeClass){
    resultEl.classList.add(...effect.themeClass.split(" "));
  }
  if(effect.screenClass){
    screenEl.classList.add(...effect.screenClass.split(" "));
  }
}

function drawFromPool(){
  if(pool.length === 0) return null;

  const index = Math.floor(Math.random() * pool.length);
  const picked = pool[index];
  pool.splice(index, 1);
  return picked;
}

async function rollAnimation(){
  const totalSteps = 22;
  clearResultTheme();
  resultEl.className = "result rolling";
  descEl.textContent = "추첨 중......";

  for(let i = 0; i < totalSteps; i++){
    resultEl.textContent = randomFrom([...failTexts, ...prizeList]);
    playRollSound(i);
    if(i % 4 === 0) glitch();
    const delay = 45 + i * 9;
    await new Promise(r => setTimeout(r, delay));
  }
}

function finishAll(){
  clearResultTheme();
  resultEl.className = "result final";
  resultEl.textContent = "ALL DRAW COMPLETE";
  descEl.textContent = acquiredWins.length === prizeList.length
    ? "모든 결과가 소진되었습니다. 모든 당첨 항목을 확보했습니다."
    : "모든 결과가 소진되었습니다. 더 이상 추첨할 수 없습니다.";

  drawBtn.disabled = true;
  drawBtn.textContent = "DRAW CLOSED";
  statusTextEl.textContent = "COMPLETE";
  flash();
  glitch();
  playFinalSound();
  addLog("final", "모든 결과 소진");
  saveState();
}

async function draw(){
  if(isRolling) return;

  if(pool.length === 0){
    finishAll();
    return;
  }

  isRolling = true;
  updateCounters();

  playClickSound();
  drawBtn.disabled = true;
  drawBtn.textContent = "PROCESSING...";

  await rollAnimation();

  const picked = drawFromPool();

  resultEl.className = "result";
  flash();
  glitch();

  if(!picked){
    isRolling = false;
    updateCounters();
    finishAll();
    return;
  }

  if(picked.type === "win"){
    const effect = prizeEffects[picked.label] || null;

    resultEl.classList.add("win");
    applyPrizeTheme(picked.label);
    resultEl.textContent = picked.label;
    descEl.textContent = effect ? effect.desc : "당첨되었습니다. 시스템이 유효한 보상을 승인했습니다.";

    if(effect){
      playPrizeSound(effect.sound);
    }else{
      playWinSound();
    }

    acquiredWins.push(picked.label);
    addLog("win", picked.label);
    renderWinList();
  }else{
    clearResultTheme();
    const failText = randomFrom(failTexts);
    resultEl.classList.add("lose");
    resultEl.textContent = failText;
    descEl.textContent = "유효한 보상을 찾지 못했습니다. 해당 결과는 풀에서 제외됩니다.";
    playLoseSound();
    addLog("lose", failText);
  }

  isRolling = false;
  updateCounters();
  saveState();

  if(pool.length === 0){
    finishAll();
    return;
  }

  drawBtn.disabled = false;
  drawBtn.textContent = "EXECUTE DRAW";
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

drawBtn.addEventListener("click", draw);

muteBtn.addEventListener("click", () => {
  soundOn = !soundOn;
  muteBtn.textContent = `SOUND : ${soundOn ? "ON" : "OFF"}`;
  if(soundOn) playClickSound();
});

resetBtn.addEventListener("click", () => {
  const ok = confirm("정말로 모든 추첨 데이터를 초기화할까요?");
  if(!ok) return;
  resetState();
});

function createParticles(){
  const container = document.getElementById("particles");
  for(let i = 0; i < 18; i++){
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.top = (-120 - Math.random() * 500) + "px";
    p.style.height = (40 + Math.random() * 100) + "px";
    p.style.animationDuration = (5 + Math.random() * 7) + "s";
    p.style.animationDelay = (-Math.random() * 10) + "s";
    p.style.opacity = 0.12 + Math.random() * 0.28;
    container.appendChild(p);
  }
}

function boot(){
  createParticles();
  loadState();
  renderWinList();
  renderLogs();
  updateCounters();

  if(pool.length === 0){
    clearResultTheme();
    resultEl.className = "result final";
    resultEl.textContent = "ALL DRAW COMPLETE";
    descEl.textContent = acquiredWins.length === prizeList.length
      ? "모든 결과가 소진되었습니다. 모든 당첨 항목을 확보했습니다."
      : "모든 결과가 소진되었습니다. 더 이상 추첨할 수 없습니다.";
    drawBtn.disabled = true;
    drawBtn.textContent = "DRAW CLOSED";
    statusTextEl.textContent = "COMPLETE";
  }
}

boot();
</script>
